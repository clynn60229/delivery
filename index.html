<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>進出貨系統</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f2f2f7;
}

.container{
  max-width:500px;
  margin:auto;
  padding:30px 20px 60px;
}

h1{
  font-size:22px;
  margin-bottom:20px;
}

.tabGroup{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tabBtn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#e5e5ea;
}

.tabBtn.active{
  background:#007AFF;
  color:white;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
}

.label{
  margin-top:15px;
  font-size:14px;
  color:#666;
}

input, select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

.mainBtn{
  width:100%;
  padding:16px;
  margin-top:25px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#007AFF;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>📦 進出貨系統</h1>

<div class="tabGroup">
  <button class="tabBtn active" onclick="switchTab('in')">收貨</button>
  <button class="tabBtn" onclick="switchTab('out')">寄貨</button>
</div>

<div class="card">

<!-- ================= 收貨 ================= -->
<div id="inBox">

<div class="label">寄件品牌</div>
<select id="brand" onchange="checkBrand()">
  <option value="">請選擇</option>
  <option>TR Dior</option>
  <option>TW Dior</option>
  <option>GL</option>
  <option>CPB</option>
  <option>LAP</option>
  <option>TF</option>
  <option>BB</option>
  <option value="other">Other</option>
</select>

<input type="text" id="brandOther" placeholder="請輸入品牌" style="display:none">

<div class="label">收件人</div>
<select id="receiver">
  <option value="">請選擇</option>
  <option>鄭芸</option>
  <option>蔡品蓁</option>
  <option>陳慧蘭</option>
  <option>柯晨揚</option>
  <option>邱文妍</option>
  <option>蔡惠美</option>
  <option>鄭苓</option>
</select>

<div class="label">件數</div>
<input type="number" id="qty">

<div class="label">快遞公司</div>
<select id="delivery">
  <option value="">請選擇</option>
  <option>黑貓宅急便</option>
  <option>嘉里大榮</option>
  <option>永勝</option>
  <option>順豐</option>
</select>

<div class="label">上傳照片（含關稅）</div>
<input type="file" id="photo">

<button class="mainBtn" onclick="submitIn()">完成收貨</button>

</div>

<!-- ================= 寄貨 ================= -->
<div id="outBox" style="display:none">

<div class="label">收件人</div>
<select id="sender">
  <option value="">請選擇</option>
  <option>鄭芸</option>
  <option>蔡品蓁</option>
  <option>陳慧蘭</option>
  <option>柯晨揚</option>
  <option>邱文妍</option>
  <option>蔡惠美</option>
  <option>鄭苓</option>
</select>

<div class="label">收件人</div>
<input type="text" id="outReceiver">

<div class="label">件數</div>
<input type="number" id="outQty">

<div class="label">快遞公司</div>
<select id="outDelivery">
  <option value="">請選擇</option>
  <option>黑貓宅急便</option>
  <option>嘉里大榮</option>
  <option>永勝</option>
  <option>順豐</option>
</select>

<div class="label">上傳收貨單</div>
<input type="file" id="receipt">

<button class="mainBtn" onclick="submitOut()">完成寄貨</button>

</div>

</div>
</div>

<script>

// 切換
function switchTab(type){
  document.getElementById("inBox").style.display = type==="in"?"block":"none"
  document.getElementById("outBox").style.display = type==="out"?"block":"none"

  let btns = document.querySelectorAll(".tabBtn")
  btns.forEach(btn=>btn.classList.remove("active"))
  event.target.classList.add("active")
}

// 品牌 Other
function checkBrand(){
  const val = document.getElementById("brand").value
  document.getElementById("brandOther").style.display = val==="other"?"block":"none"
}

// 收貨送出
function submitIn(){
  alert("收貨送出（之後接 Apps Script）")
}

// 寄貨送出
function submitOut(){
  alert("寄貨送出（之後接 Apps Script）")
}

</script>

</body>
</html>
