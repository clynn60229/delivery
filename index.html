<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>菲塔進出貨系統</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f2f2f7;
}
.container{
  max-width:500px;
  margin:auto;
  padding:30px 20px 60px;
}
h1{font-size:22px;margin-bottom:20px;}
.card{
  background:white;
  border-radius:20px;
  padding:20px;
}
.label{margin-top:15px;font-size:14px;color:#666;}
input, select{
  width:100%;padding:14px;margin-top:8px;
  border-radius:12px;border:1px solid #ddd;
}
.mainBtn{
  width:100%;padding:16px;margin-top:20px;
  border:none;border-radius:14px;
  background:#007AFF;color:white;font-size:16px;
}
</style>
</head>

<body>

<!-- 🏠 首頁 -->
<div id="homePage" class="container">

  <h1>📦 菲塔進出貨系統</h1>

  <button class="mainBtn" onclick="showPage('formPage')">
    📦 登記收 / 寄貨
  </button>

  <button class="mainBtn" style="background:#34C759" onclick="showPage('searchPage')">
    🔍 查詢貨單
  </button>

</div>

<div id="formPage" class="container" style="display:none">

<h1>📦 菲塔進出貨系統</h1>

<div class="tabGroup">
  <button class="tabBtn active" onclick="switchTab('in', this)">收貨</button>
  <button class="tabBtn" onclick="switchTab('out', this)">寄貨</button>
</div>

<div class="card">

<!-- 收貨 -->
<div id="inBox">

<div class="label">寄件品牌</div>
<select id="brand" onchange="checkBrand('in')">
  <option value="">請選擇</option>
  <option>TR Dior</option>
  <option>TW Dior</option>
  <option>GL</option>
  <option>CPB</option>
  <option>LAP</option>
  <option>TF</option>
  <option>BB</option>
  <option value="other">Other</option>
</select>

<input type="text" id="brandOther" placeholder="請輸入品牌" style="display:none">

<div class="label">收件人</div>
<select id="receiver">
  <option value="">請選擇</option>
  <option>鄭芸</option>
  <option>蔡品蓁</option>
  <option>陳慧蘭</option>
  <option>柯晨揚</option>
  <option>邱文妍</option>
  <option>蔡惠美</option>
  <option>鄭苓</option>
</select>

<div class="label">件數</div>
<input type="number" id="qty">

<div class="label">快遞公司</div>
<select id="delivery">
  <option value="">請選擇</option>
  <option>黑貓宅急便</option>
  <option>嘉里大榮</option>
  <option>永勝</option>
  <option>順豐</option>
  <option>Fedex</option>
  <option>DHL</option>
</select>

<div class="label">上傳照片（含關稅）</div>
<input type="file" id="photo" onchange="showFileName(this, 'photoName')">
<div id="photoName" style="font-size:13px;color:#666;margin-top:5px;"></div>

<button class="mainBtn" onclick="submitIn(this)">完成收貨</button>

</div>

<!-- 寄貨 -->
<div id="outBox" style="display:none">

<div class="label">寄件人</div>
<select id="sender">
  <option value="">請選擇</option>
  <option>鄭芸</option>
  <option>蔡品蓁</option>
  <option>陳慧蘭</option>
  <option>柯晨揚</option>
  <option>邱文妍</option>
  <option>蔡惠美</option>
  <option>鄭苓</option>
</select>

<div class="label">收件品牌</div>
<select id="outBrand" onchange="checkBrand('out')">
  <option value="">請選擇</option>
  <option>TR Dior</option>
  <option>TW Dior</option>
  <option>GL</option>
  <option>CPB</option>
  <option>LAP</option>
  <option>TF</option>
  <option>BB</option>
  <option value="other">Other</option>
</select>

<input type="text" id="outBrandOther" placeholder="請輸入品牌" style="display:none">

<div class="label">件數</div>
<input type="number" id="outQty">

<div class="label">快遞公司</div>
<select id="outDelivery">
  <option value="">請選擇</option>
  <option>黑貓宅急便</option>
  <option>嘉里大榮</option>
  <option>永勝</option>
  <option>順豐</option>
</select>

<div class="label">上傳收貨單</div>
<input type="file" id="receipt" onchange="showFileName(this, 'receiptName')">
<div id="receiptName" style="font-size:13px;color:#666;margin-top:5px;"></div>

<button class="mainBtn" onclick="submitOut(this)">完成寄貨</button>

</div>

</div>
</div>
  
<!-- 🔍 查詢頁 -->
<div id="searchPage" style="display:none">
  <h1>🔍 查詢紀錄</h1>

  <div class="card">

    <div class="label">類型</div>
    <select id="type">
      <option value="">全部</option>
      <option value="in">收貨</option>
      <option value="out">寄貨</option>
    </select>

    <div class="label">日期</div>
    <input type="date" id="date">

    <div class="label">品牌</div>
    <select id="searchBrand">
        <option value="">請選擇</option>
        <option>TR Dior</option>
        <option>TW Dior</option>
        <option>GL</option>
        <option>CPB</option>
        <option>LAP</option>
        <option>TF</option>
        <option>BB</option>
        <option value="other">Other</option>
      </select>

    <div class="label">人員</div>
    <select id="staff">
      <option value="">請選擇</option>
      <option>鄭芸</option>
      <option>蔡品蓁</option>
      <option>陳慧蘭</option>
      <option>柯晨揚</option>
      <option>邱文妍</option>
      <option>蔡惠美</option>
      <option>鄭苓</option>
    </select>

    

    <div class="label">快遞</div>
    <select id="searchDelivery">
      <option value="">請選擇</option>
      <option>黑貓宅急便</option>
      <option>嘉里大榮</option>
      <option>永勝</option>
      <option>順豐</option>
    </select>

    <button class="mainBtn" onclick="loadData()">查詢</button>

  </div>

  <div id="list"></div>

  <button class="mainBtn" onclick="showPage('homePage')" style="background:#999">← 返回</button>
</div>

</div>

<script>
let isSubmitting = false;
  
const GAS_URL = "https://script.google.com/macros/s/AKfycbxb6t98Re7qfmt-G82utjiQqJhgpqFwBsj7GxBn5IRLFyxgPcMFkEQ9k7SJuQBXOm-PlA/exec"

// 切換
function switchTab(type, el){
  document.getElementById("inBox").style.display = type==="in"?"block":"none"
  document.getElementById("outBox").style.display = type==="out"?"block":"none"

  document.querySelectorAll(".tabBtn").forEach(btn=>btn.classList.remove("active"))
  el.classList.add("active")
}

// Other品牌
function checkBrand(type){
  if(type==="in"){
    const val = document.getElementById("brand").value
    document.getElementById("brandOther").style.display = val==="other"?"block":"none"
  }else{
    const val = document.getElementById("outBrand").value
    document.getElementById("outBrandOther").style.display = val==="other"?"block":"none"
  }
}

async function submitIn(btn){
  let brand = document.getElementById("brand").value
  if(brand==="other"){
    brand = document.getElementById("brandOther").value
  }

  const data = {
    type:"in",
    brand,
    receiver:document.getElementById("receiver").value,
    qty:document.getElementById("qty").value,
    delivery:document.getElementById("delivery").value
  }

  if(!data.brand || !data.receiver || !data.qty || !data.delivery){
    alert("請填寫完整資料")
    return
  }

  await sendData(data, document.getElementById("photo"), btn);
  resetForm(); 
}

async function submitOut(btn){
  let brand = document.getElementById("outBrand").value
  if(brand==="other"){
    brand = document.getElementById("outBrandOther").value
  }

  const data = {
    type:"out",
    sender:document.getElementById("sender").value,
    brand,
    qty:document.getElementById("outQty").value,
    delivery:document.getElementById("outDelivery").value
  }

  if(!data.sender || !data.brand || !data.qty || !data.delivery){
    alert("請填寫完整資料")
    return
  }

  await sendData(data, document.getElementById("receipt"), btn);
  resetForm(); 
}

// 🔥 傳送（完整版）
async function sendData(data, fileInput, btn){

  // 🚫 已在送出 → 直接擋掉
  if(isSubmitting){
    alert("⏳ 資料送出中，請勿重複點擊")
    return
  }

  isSubmitting = true   // 🔒 上鎖

  const originalText = btn.innerText

  try{

    // 🔄 按鈕狀態
    btn.innerText = "送出中..."
    btn.disabled = true

    // =========================
    // 📸 檔案轉 base64
    // =========================
    if(fileInput && fileInput.files.length > 0){
      const file = fileInput.files[0]
      const base64 = await toBase64(file)

      data.file = base64
      data.fileType = file.type
    }

    // =========================
    // 🌐 傳送
    // =========================
    const formData = new URLSearchParams()
    formData.append("data", encodeURIComponent(JSON.stringify(data)))

    const res = await fetch(GAS_URL,{
      method:"POST",
      body: formData
    })

    const text = await res.text()
    const result = JSON.parse(text)

    if(result.status === "success"){
      alert("✅ 送出成功")
      resetForm()
    }else{
      throw new Error(result.message || "未知錯誤")
    }

  }catch(err){

    console.error(err)
    alert("❌ 送出失敗：" + err.message)

  }finally{

    // 🔓 解鎖（不管成功失敗都會跑）
    isSubmitting = false

    // 🔄 按鈕恢復
    btn.innerText = originalText
    btn.disabled = false
  }
}

// 清空
function resetForm(){
  document.querySelectorAll("input").forEach(i=>{
    if(i.type !== "file") i.value=""
    else i.value = null
  })

  document.querySelectorAll("select").forEach(s=>s.value="")

  document.getElementById("photoName").innerText=""
  document.getElementById("receiptName").innerText=""
}

// 顯示檔名
function showFileName(input, targetId){
  const file = input.files[0] 
  if(file){ 
    document.getElementById(targetId).innerText = "已選：" + file.name 
  } 
}

// 轉 base64
function toBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader()

    reader.onload = function(){
      resolve(reader.result)
    }

    reader.onerror = function(e){
      console.error("讀取失敗:", e)
      reject(e)
    }

    reader.readAsDataURL(file)
  })
}
    
function showPage(id){
  ["homePage","formPage","searchPage"].forEach(p=>{
    document.getElementById(p).style.display="none"
  })
  document.getElementById(id).style.display="block"
}

// 查詢
async function loadData(){

  const type = document.getElementById("type").value
  const date = document.getElementById("date").value
  const brand = document.getElementById("searchBrand").value.toLowerCase()
  const person = document.getElementById("staff").value.toLowerCase()
  const delivery = document.getElementById("searchDelivery").value.toLowerCase()

  let url = GAS_URL + "?action=search"
  if(type) url += "&type=" + type

  const res = await fetch(url)
  const data = await res.json()

  let html = ""

  data.slice(1).reverse().forEach(row=>{

    const d = new Date(row[0])
    const rowDate = d.toISOString().split("T")[0]

    if(date && rowDate !== date) return
    if(brand && !String(row[1]).toLowerCase().includes(brand)) return
    if(person && !String(row[2]).toLowerCase().includes(person)) return
    if(delivery && !String(row[4]).toLowerCase().includes(delivery)) return

    html += `
      <div class="card" style="margin-top:15px">
        <div>📅 ${row[0]}</div>
        <div>📦 ${row[1]}</div>
        <div>👤 ${row[2]}</div>
        <div>📊 ${row[3]} 件</div>
        <div>🚚 ${row[4]}</div>
        ${row[5] ? `<a href="${row[5]}" target="_blank">📎 附件</a>` : ""}
      </div>
    `
  })

  document.getElementById("list").innerHTML = html || "❌ 查無資料"
}

showPage("homePage")
  
</script>

</body>
</html>
