<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>進出貨系統</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f2f2f7;
}

.container{
  max-width:500px;
  margin:auto;
  padding:30px 20px 60px;
}

h1{
  font-size:22px;
  margin-bottom:20px;
}

.tabGroup{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tabBtn{
  flex:1;
  padding:18px;
  font-size:18px;
  border-radius:14px;
  border:none;
  background:#e5e5ea;
}

.tabBtn.active{
  background:#007AFF;
  color:white;
  font-weight:600;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-sizing:border-box;
}

.label{
  margin-top:15px;
  font-size:14px;
  color:#666;
}

input, select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

.mainBtn{
  width:100%;
  padding:16px;
  margin-top:25px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#007AFF;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>📦 進出貨系統</h1>

<div class="tabGroup">
  <button class="tabBtn active" onclick="switchTab('in', this)">收貨</button>
  <button class="tabBtn" onclick="switchTab('out', this)">寄貨</button>
</div>

<div class="card">

<!-- 收貨 -->
<div id="inBox">

<div class="label">寄件品牌</div>
<select id="brand" onchange="checkBrand('in')">
  <option value="">請選擇</option>
  <option>TR Dior</option>
  <option>TW Dior</option>
  <option>GL</option>
  <option>CPB</option>
  <option>LAP</option>
  <option>TF</option>
  <option>BB</option>
  <option value="other">Other</option>
</select>

<input type="text" id="brandOther" placeholder="請輸入品牌" style="display:none">

<div class="label">收件人</div>
<select id="receiver">
  <option value="">請選擇</option>
  <option>鄭芸</option>
  <option>蔡品蓁</option>
  <option>陳慧蘭</option>
  <option>柯晨揚</option>
  <option>邱文妍</option>
  <option>蔡惠美</option>
  <option>鄭苓</option>
</select>

<div class="label">件數</div>
<input type="number" id="qty">

<div class="label">快遞公司</div>
<select id="delivery">
  <option value="">請選擇</option>
  <option>黑貓宅急便</option>
  <option>嘉里大榮</option>
  <option>永勝</option>
  <option>順豐</option>
  <option>Fedex</option>
  <option>DHL</option>
</select>

<button class="mainBtn" onclick="submitIn()">完成收貨</button>

</div>

<!-- 寄貨 -->
<div id="outBox" style="display:none">

<div class="label">寄件人</div>
<select id="sender">
  <option value="">請選擇</option>
  <option>鄭芸</option>
  <option>蔡品蓁</option>
  <option>陳慧蘭</option>
  <option>柯晨揚</option>
  <option>邱文妍</option>
  <option>蔡惠美</option>
  <option>鄭苓</option>
</select>

<div class="label">收件品牌</div>
<select id="outBrand" onchange="checkBrand('out')">
  <option value="">請選擇</option>
  <option>TR Dior</option>
  <option>TW Dior</option>
  <option>GL</option>
  <option>CPB</option>
  <option>LAP</option>
  <option>TF</option>
  <option>BB</option>
  <option value="other">Other</option>
</select>

<input type="text" id="outBrandOther" placeholder="請輸入品牌" style="display:none">

<div class="label">件數</div>
<input type="number" id="outQty">

<div class="label">快遞公司</div>
<select id="outDelivery">
  <option value="">請選擇</option>
  <option>黑貓宅急便</option>
  <option>嘉里大榮</option>
  <option>永勝</option>
  <option>順豐</option>
</select>

<button class="mainBtn" onclick="submitOut()">完成寄貨</button>

</div>

</div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbx-n5_Cbbhz8pdtAA994hRKf8yEDPlD1dd5jIsnYaCxvbPdyByWiO1eBF1G77l7M1DIgw/exec"

// 切換
function switchTab(type, el){
  document.getElementById("inBox").style.display = type==="in"?"block":"none"
  document.getElementById("outBox").style.display = type==="out"?"block":"none"

  document.querySelectorAll(".tabBtn").forEach(btn=>btn.classList.remove("active"))
  el.classList.add("active")
}

// Other品牌
function checkBrand(type){
  if(type==="in"){
    const val = document.getElementById("brand").value
    document.getElementById("brandOther").style.display = val==="other"?"block":"none"
  }else{
    const val = document.getElementById("outBrand").value
    document.getElementById("outBrandOther").style.display = val==="other"?"block":"none"
  }
}

// 收貨
function submitIn(){

  let brand = document.getElementById("brand").value
  if(brand==="other"){
    brand = document.getElementById("brandOther").value
  }

  const data = {
    type:"in",
    brand,
    receiver:document.getElementById("receiver").value,
    qty:document.getElementById("qty").value,
    delivery:document.getElementById("delivery").value
  }

  if(!data.receiver || !data.qty){
    alert("請填寫完整資料")
    return
  }

  sendData(data)
}

// 寄貨
function submitOut(){

  let brand = document.getElementById("outBrand").value
  if(brand==="other"){
    brand = document.getElementById("outBrandOther").value
  }

  const data = {
    type:"out",
    sender:document.getElementById("sender").value,
    brand,
    qty:document.getElementById("outQty").value,
    delivery:document.getElementById("outDelivery").value
  }

  if(!data.sender || !data.qty){
    alert("請填寫完整資料")
    return
  }

  sendData(data)
}

// 傳送
function sendData(data){

  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify(data)
  })
  .then(res=>res.text())
  .then(()=>{
    alert("✅ 完成")
    location.reload()
  })
  .catch(()=>{
    alert("❌ 失敗")
  })
}

</script>

</body>
</html>
