<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>菲塔進出貨系統</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f2f2f7;
}
  
.container{
  max-width:500px;
  margin:auto;
  padding:30px 20px 60px;
}
  
h1{
  font-size:22px;
  margin-bottom: 20px;}
  
.card{
  background:white;
  border-radius:20px;
  padding:20px;
}
  
.label{
  margin-top:15px;
  font-size:14px;
  color:#666;}

input, select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}
  
input[type="date"]{
  width:100%;
  max-width:100%;
  min-width:0;
  box-sizing:border-box;

  -webkit-appearance: none;
  appearance: none;

  padding:14px;
  height:48px;          /* 🔥 補高度 */
  line-height:20px;     /* 🔥 讓字不貼邊 */

  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;

  background:white;     /* iOS 有時候會透明 */
}
  
.tabGroup{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tabBtn{
  flex:1;
  padding:18px;
  font-size:18px;
  border-radius:14px;
  border:none;
  background:#e5e5ea;
}

.tabBtn.active{
  background:#007AFF;
  color:white;
  font-weight:600;
}
.mainBtn{
  width:100%;padding:16px;margin-top:20px;
  border:none;border-radius:14px;
  background:#007AFF;color:white;font-size:18px;
}
.tableWrap{
  background:white;
  border-radius:16px;
  overflow:hidden;
  margin-top:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.tableWrap table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

.tableWrap th{
  background:#f7f7f7;
  padding:12px;
  font-weight:600;
  color:#555;
}

.tableWrap td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid #eee;
}

.tableWrap tr:last-child td{
  border-bottom:none;
}

/* 📱 手機優化 */
.tableWrap td{
  font-size:13px;
}

.tableWrap a{
  color:#007AFF;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
    <!-- 🏠 首頁 -->
    <div id="homePage">
    
      <h1>📦 菲塔進出貨系統</h1>
    
      <button class="mainBtn" onclick="showPage('formPage')">
        📦 登記收 / 寄貨
      </button>
    
      <button class="mainBtn" style="background:#34C759" onclick="showPage('searchPage')">
        🔍 查詢貨單
      </button>
    
    </div>

    <div id="formPage" style="display:none">
    
    <h1>📦 菲塔進出貨系統</h1>
    
    <div class="tabGroup">
      <button class="tabBtn active" onclick="switchTab('in', this)">收貨</button>
      <button class="tabBtn" onclick="switchTab('out', this)">寄貨</button>
    </div>
    
    <div class="card">

<!-- 收貨 -->
  <div id="inBox">
  
  <div class="label">寄件品牌</div>
  <select id="brand" onchange="checkBrand('in')">
    <option value="">請選擇</option>
    <option>TR Dior</option>
    <option>TW Dior</option>
    <option>GL</option>
    <option>CPB</option>
    <option>LAP</option>
    <option>TF</option>
    <option>BB</option>
    <option value="other">Other</option>
  </select>
  
  <input type="text" id="brandOther" placeholder="請輸入品牌" style="display:none">

  <div class="label">收件人</div>
  <select id="receiver">
    <option value="">請選擇</option>
    <option>鄭芸</option>
    <option>蔡品蓁</option>
    <option>陳慧蘭</option>
    <option>柯晨揚</option>
    <option>邱文妍</option>
    <option>蔡惠美</option>
    <option>鄭苓</option>
  </select>

  <div class="label">件數</div>
  <input type="number" id="qty">
  
  <div class="label">快遞公司</div>
  <select id="delivery">
    <option value="">請選擇</option>
    <option>黑貓宅急便</option>
    <option>嘉里大榮</option>
    <option>永勝</option>
    <option>順豐</option>
    <option>Fedex</option>
    <option>DHL</option>
  </select>

  <div class="label">上傳照片（含關稅）</div>
  <input type="file" id="photo" onchange="showFileName(this, 'photoName')">
  <div id="photoName" style="font-size:13px;color:#666;margin-top:5px;"></div>

  <button class="mainBtn" onclick="submitIn(this)">完成收貨</button>
  <button class="mainBtn" onclick="showPage('homePage')" style="background:#999">← 返回</button>

</div>

<!-- 寄貨 -->
<div id="outBox" style="display:none">

<div class="label">寄件人</div>
<select id="sender">
  <option value="">請選擇</option>
  <option>鄭芸</option>
  <option>蔡品蓁</option>
  <option>陳慧蘭</option>
  <option>柯晨揚</option>
  <option>邱文妍</option>
  <option>蔡惠美</option>
  <option>鄭苓</option>
</select>

<div class="label">收件品牌</div>
<select id="outBrand" onchange="checkBrand('out')">
  <option value="">請選擇</option>
  <option>TR Dior</option>
  <option>TW Dior</option>
  <option>GL</option>
  <option>CPB</option>
  <option>LAP</option>
  <option>TF</option>
  <option>BB</option>
  <option value="other">Other</option>
</select>

<input type="text" id="outBrandOther" placeholder="請輸入品牌" style="display:none">

<div class="label">件數</div>
<input type="number" id="outQty">

<div class="label">快遞公司</div>
<select id="outDelivery">
  <option value="">請選擇</option>
  <option>黑貓宅急便</option>
  <option>嘉里大榮</option>
  <option>永勝</option>
  <option>順豐</option>
</select>

<div class="label">上傳收貨單</div>
<input type="file" id="receipt" onchange="showFileName(this, 'receiptName')">
<div id="receiptName" style="font-size:13px;color:#666;margin-top:5px;"></div>

<button class="mainBtn" onclick="submitOut(this)">完成寄貨</button>
<button class="mainBtn" onclick="showPage('homePage')" style="background:#999">← 返回</button>

</div>

</div>
</div>
  
<!-- 🔍 查詢頁 -->
<div id="searchPage" style="display:none">
  
<div style="display:flex; align-items:center; margin-bottom:10px;">
  <button onclick="showPage('homePage')" 
    style="border:none; background:none; font-size:18px; margin-right:10px;">
    ←
  </button>
  <h1 style="margin:20;">🔍 查詢紀錄</h1>
</div>

  <div class="card">

    <div class="label">類型</div>
    <select id="type">
      <option value="in">收貨</option>
      <option value="out">寄貨</option>
    </select>

    <div class="label">日期</div>
    <input type="date" id="date">

    <div class="label">品牌</div>
    <select id="searchBrand">
        <option value="">請選擇</option>
        <option>TR Dior</option>
        <option>TW Dior</option>
        <option>GL</option>
        <option>CPB</option>
        <option>LAP</option>
        <option>TF</option>
        <option>BB</option>
        <option value="other">Other</option>
      </select>

    <div class="label">人員</div>
    <select id="staff">
      <option value="">請選擇</option>
      <option>鄭芸</option>
      <option>蔡品蓁</option>
      <option>陳慧蘭</option>
      <option>柯晨揚</option>
      <option>邱文妍</option>
      <option>蔡惠美</option>
      <option>鄭苓</option>
    </select>

    

    <div class="label">快遞</div>
    <select id="searchDelivery">
      <option value="">請選擇</option>
      <option>黑貓宅急便</option>
      <option>嘉里大榮</option>
      <option>永勝</option>
      <option>順豐</option>
    </select>

    <button class="mainBtn" onclick="loadData()">查詢</button>
    

  </div>

  <div id="list"></div>

  
</div>

</div>

</div>

</body>
  
<script>
let isSubmitting = false;
  
const GAS_URL = "https://script.google.com/macros/s/AKfycbxb6t98Re7qfmt-G82utjiQqJhgpqFwBsj7GxBn5IRLFyxgPcMFkEQ9k7SJuQBXOm-PlA/exec"

// 切換
function switchTab(type, el){
  document.getElementById("inBox").style.display = type==="in"?"block":"none"
  document.getElementById("outBox").style.display = type==="out"?"block":"none"

  document.querySelectorAll(".tabBtn").forEach(btn=>btn.classList.remove("active"))
  el.classList.add("active")
}

// Other品牌
function checkBrand(type){
  if(type==="in"){
    const val = document.getElementById("brand").value
    document.getElementById("brandOther").style.display = val==="other"?"block":"none"
  }else{
    const val = document.getElementById("outBrand").value
    document.getElementById("outBrandOther").style.display = val==="other"?"block":"none"
  }
}

async function submitIn(btn){
  let brand = document.getElementById("brand").value
  if(brand==="other"){
    brand = document.getElementById("brandOther").value
  }

  const data = {
    type:"in",
    brand,
    receiver:document.getElementById("receiver").value,
    qty:document.getElementById("qty").value,
    delivery:document.getElementById("delivery").value
  }

  if(!data.brand || !data.receiver || !data.qty || !data.delivery){
    alert("請填寫完整資料")
    return
  }

  await sendData(data, document.getElementById("photo"), btn);
  resetForm(); 
}

async function submitOut(btn){
  let brand = document.getElementById("outBrand").value
  if(brand==="other"){
    brand = document.getElementById("outBrandOther").value
  }

  const data = {
    type:"out",
    sender:document.getElementById("sender").value,
    brand,
    qty:document.getElementById("outQty").value,
    delivery:document.getElementById("outDelivery").value
  }

  if(!data.sender || !data.brand || !data.qty || !data.delivery){
    alert("請填寫完整資料")
    return
  }

  await sendData(data, document.getElementById("receipt"), btn);
  resetForm(); 
}

// 🔥 傳送（完整版）
async function sendData(data, fileInput, btn){

  // 🚫 已在送出 → 直接擋掉
  if(isSubmitting){
    alert("⏳ 資料送出中，請勿重複點擊")
    return
  }

  isSubmitting = true   // 🔒 上鎖

  const originalText = btn.innerText

  try{

    // 🔄 按鈕狀態
    btn.innerText = "送出中..."
    btn.disabled = true

    // =========================
    // 📸 檔案轉 base64
    // =========================
    if(fileInput && fileInput.files.length > 0){
      const file = fileInput.files[0]
      const base64 = await toBase64(file)

      data.file = base64
      data.fileType = file.type
    }

    // =========================
    // 🌐 傳送
    // =========================
    const formData = new URLSearchParams()
    formData.append("data", encodeURIComponent(JSON.stringify(data)))

    const res = await fetch(GAS_URL,{
      method:"POST",
      body: formData
    })

    const text = await res.text()
    const result = JSON.parse(text)

    if(result.status === "success"){
      alert("✅ 送出成功")
      resetForm()
    }else{
      throw new Error(result.message || "未知錯誤")
    }

  }catch(err){

    console.error(err)
    alert("❌ 送出失敗：" + err.message)

  }finally{

    // 🔓 解鎖（不管成功失敗都會跑）
    isSubmitting = false

    // 🔄 按鈕恢復
    btn.innerText = originalText
    btn.disabled = false
  }
}

// 清空
function resetForm(){
  document.querySelectorAll("input").forEach(i=>{
    if(i.type !== "file") i.value=""
    else i.value = null
  })

  document.querySelectorAll("select").forEach(s=>s.value="")

  document.getElementById("photoName").innerText=""
  document.getElementById("receiptName").innerText=""
}

// 顯示檔名
function showFileName(input, targetId){
  const file = input.files[0] 
  if(file){ 
    document.getElementById(targetId).innerText = "已選：" + file.name 
  } 
}

// 轉 base64
function toBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader()

    reader.onload = function(){
      resolve(reader.result)
    }

    reader.onerror = function(e){
      console.error("讀取失敗:", e)
      reject(e)
    }

    reader.readAsDataURL(file)
  })
}
    
function showPage(id){
  ["homePage","formPage","searchPage"].forEach(p=>{
    document.getElementById(p).style.display="none"
  })
  document.getElementById(id).style.display="block"
}

// 查詢
async function loadData(){

  const type = document.getElementById("type").value
  const date = document.getElementById("date").value
  const brand = document.getElementById("searchBrand").value.toLowerCase()
  const person = document.getElementById("staff").value.toLowerCase()
  const delivery = document.getElementById("searchDelivery").value.toLowerCase()

  let url = GAS_URL + "?action=search"
  if(type) url += "&type=" + type

  const res = await fetch(url)
  const data = await res.json()

  let html = `
    <div class="tableWrap">
    <table>
        <th>時間</th>
        <th>品牌</th>
        <th>人員</th>
        <th>件數</th>
        <th>快遞</th>
        <th>附件</th>
      </tr>
  `

  let hasData = false

  data.slice(1).reverse().forEach(row=>{

    const d = new Date(row[0])

    const y = d.getFullYear()
    const m = String(d.getMonth()+1).padStart(2,'0')
    const day = String(d.getDate()).padStart(2,'0')
    const h = String(d.getHours()).padStart(2,'0')
    const min = String(d.getMinutes()).padStart(2,'0')

    const rowDate = `${y}-${m}-${day}`
    const timeStr = `${y}/${m}/${day} ${h}:${min}`

    let brandVal = row[1]
    let personVal = row[2]

    // 👉 寄貨欄位對調
    if(type === "out"){
      brandVal = row[2]
      personVal = row[1]
    }

    // 🔍 篩選
    if(date && rowDate !== date) return
    if(brand && (!brandVal || !brandVal.toLowerCase().includes(brand))) return
    if(person && (!personVal || !personVal.toLowerCase().includes(person))) return
    if(delivery && (!row[4] || !row[4].toLowerCase().includes(delivery))) return

    hasData = true

    html += `
      <tr style="text-align:center; border-bottom:1px solid #eee;">
        <td>${timeStr}</td>
        <td>${brandVal}</td>
        <td>${personVal}</td>
        <td>${row[3]}</td>
        <td>${row[4]}</td>
        <td>${row[5] ? `<a href="${row[5]}" target="_blank">查看</a>` : ""}</td>
      </tr>
    `
  })

  html += `</table></div>`

  document.getElementById("list").innerHTML = hasData ? html : "❌ 查無資料"
}
  
showPage("homePage")
  
</script>

</body>
</html>
